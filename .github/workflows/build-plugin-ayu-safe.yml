name: Build ayu_safe plugin

on:
  workflow_dispatch:
  push:
    branches:
      - Plugins
    paths:
      - ".github/workflows/build-plugin-ayu-safe.yml"
      - ".github/workflows/build-plugins.yml"
      - "PluginCatalog/CMakeLists.txt"
      - "PluginCatalog/ayu_safe/**"
      - "Telegram/Plugins/Examples/ayu_safe.cpp"

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip plugin-catalog]') }}
    uses: ./.github/workflows/build-plugins.yml
    with:
      plugin_name: ayu_safe
      allow_commit: ${{ github.event_name == 'push' }}
      target_branch: Plugins
    secrets: inherit
