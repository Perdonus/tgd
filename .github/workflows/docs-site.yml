name: Build Astrogram Docs

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/docs-site.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: astrogram-docs
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package.json

      - name: Install dependencies
        working-directory: site
        run: npm install --no-fund --no-audit

      - name: Build docs
        working-directory: site
        run: npm run docs:build

      - name: Publish docs-build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/docs/.vitepress/dist
          publish_branch: docs-build
          force_orphan: true
