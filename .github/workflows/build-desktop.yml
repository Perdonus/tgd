name: Build Telegram Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-desktop.yml'
      - 'Telegram/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'lib/**'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows (preferred)
    runs-on: windows-2022
    timeout-minutes: 360
    continue-on-error: true
    outputs:
      build_ok: ${{ steps.build.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build (Windows Release)
        id: build
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion

          git config --global core.longpaths true
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000

          set "PREPARE_MAX_TRIES=3"
          set "PREPARE_TRY=1"
          :prepare_retry
          echo [prepare] attempt !PREPARE_TRY! of !PREPARE_MAX_TRIES!
          call Telegram\build\prepare\win.bat
          if not errorlevel 1 goto prepare_ok
          if !PREPARE_TRY! GEQ !PREPARE_MAX_TRIES! (
            echo [prepare] failed after !PREPARE_TRY! attempts
            exit /b 1
          )
          echo [prepare] failed, retry in 20s (transient network/proxy errors are common)
          timeout /t 20 /nobreak >nul
          set /a PREPARE_TRY+=1
          goto prepare_retry
          :prepare_ok

          set "CMAKE_SUBMODULE_MAX_TRIES=3"
          set "CMAKE_SUBMODULE_TRY=1"
          :cmake_submodule_retry
          if exist cmake\run_cmake.py goto cmake_submodule_ok
          echo [cmake-submodule] attempt !CMAKE_SUBMODULE_TRY! of !CMAKE_SUBMODULE_MAX_TRIES!
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1 cmake
          if exist cmake\run_cmake.py goto cmake_submodule_ok
          if !CMAKE_SUBMODULE_TRY! GEQ !CMAKE_SUBMODULE_MAX_TRIES! (
            echo [cmake-submodule] cmake\\run_cmake.py is still missing
            exit /b 1
          )
          timeout /t 10 /nobreak >nul
          set /a CMAKE_SUBMODULE_TRY+=1
          goto cmake_submodule_retry
          :cmake_submodule_ok

          cd Telegram
          configure.bat x64 -D TDESKTOP_API_TEST=ON
          if errorlevel 1 exit /b 1

          cmake --build ..\out --config Release --target Telegram
          if errorlevel 1 exit /b 1

      - name: Locate built EXE
        if: ${{ steps.build.outcome == 'success' }}
        id: locate_exe
        shell: pwsh
        run: |
          $roots = @(
            "$PWD/out",
            "$PWD/Telegram/out",
            "$PWD/out/Release",
            "$PWD/out/Debug",
            "$PWD/../out",
            "$PWD/../../out",
            "$PWD/../tgd/out",
            "$PWD/../../tgd/out"
          ) | Where-Object { Test-Path $_ }

          $matches = @()
          foreach ($root in $roots) {
            $matches += Get-ChildItem -Path $root -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -ieq "Telegram.exe" -or $_.Name -ieq "Telegram" }
          }
          $matches = $matches | Sort-Object LastWriteTime -Descending -Unique

          if (-not $matches -or $matches.Count -eq 0) {
            Write-Host "Searched roots:"
            $roots | ForEach-Object { Write-Host " - $_" }
            Write-Host "Top executables for debugging:"
            if (Test-Path "$PWD/out") {
              Get-ChildItem -Path "$PWD/out" -Recurse -File -Include *.exe -ErrorAction SilentlyContinue |
                Select-Object -First 40 FullName
            }
            Write-Error "Telegram binary was not found in known output paths."
            exit 1
          }

          $picked = $matches | Select-Object -First 1
          New-Item -ItemType Directory -Path "$PWD/dist" -Force | Out-Null
          Copy-Item -LiteralPath $picked.FullName -Destination "$PWD/dist/Telegram.exe" -Force
          Write-Host "Picked binary: $($picked.FullName)"

      - name: Upload Windows artifact
        if: ${{ steps.locate_exe.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: telegram-windows-release
          path: |
            dist/Telegram.exe
          if-no-files-found: error

  linux_deb:
    name: Ubuntu .deb (fallback)
    runs-on: ubuntu-22.04
    needs: windows
    if: ${{ always() && needs.windows.outputs.build_ok != 'true' }}
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Build docker image for Linux toolchain
        env:
          JOBS: '2'
          DEBUG: ''
          LTO: ''
        run: |
          ./Telegram/build/prepare/linux.sh

      - name: Build Telegram (Release)
        run: |
          docker run --rm \
            -u "$(id -u)" \
            -v "$PWD:/usr/src/tdesktop" \
            tdesktop:centos_env \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D TDESKTOP_API_TEST=ON

      - name: Build .deb package
        run: |
          set -euo pipefail
          version="0.0.${GITHUB_RUN_NUMBER}"
          pkgroot="$PWD/package-root"
          appdir="$pkgroot/opt/tgd"
          desktopdir="$pkgroot/usr/share/applications"
          icondir="$pkgroot/usr/share/icons/hicolor/256x256/apps"

          mkdir -p "$pkgroot/DEBIAN" "$appdir" "$desktopdir" "$icondir"

          install -m 0755 out/Release/Telegram "$appdir/telegram-desktop"
          install -m 0644 lib/xdg/org.telegram.desktop.desktop "$desktopdir/org.telegram.desktop.desktop"
          install -m 0644 Telegram/Resources/art/icon256.png "$icondir/telegram-desktop.png"

          sed -i 's#^Exec=.*#Exec=/opt/tgd/telegram-desktop -- %u#' "$desktopdir/org.telegram.desktop.desktop"
          sed -i 's#^Icon=.*#Icon=telegram-desktop#' "$desktopdir/org.telegram.desktop.desktop"

          cat > "$pkgroot/DEBIAN/control" <<EOF
          Package: tgd
          Version: ${version}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: tgd build bot <noreply@example.com>
          Depends: libc6 (>= 2.31), libstdc++6
          Description: Telegram Desktop build of tgd with plugin system
          EOF

          dpkg-deb --build "$pkgroot" "tgd_${version}_amd64.deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-linux-deb
          path: |
            out/Release/Telegram
            tgd_*.deb
