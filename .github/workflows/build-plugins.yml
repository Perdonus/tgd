name: Build Plugin Catalog Entry

on:
  workflow_call:
    inputs:
      plugin_name:
        description: Plugin folder name under PluginCatalog.
        required: true
        type: string
      allow_commit:
        description: Push refreshed binaries back to the plugin branch.
        required: false
        default: false
        type: boolean
      target_branch:
        description: Branch that receives refreshed binaries.
        required: false
        default: Plugins
        type: string

permissions:
  contents: write

concurrency:
  group: build-plugin-${{ inputs.plugin_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin_sanity:
    name: Plugin catalog sanity
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run plugin sanity checks
        run: |
          python3 - <<'PY'
          import importlib.util
          import pathlib
          import sys

          root = pathlib.Path.cwd()
          script = root / "tools" / "plugin_sanity_check.py"
          spec = importlib.util.spec_from_file_location("plugin_sanity_check", script)
          if spec is None or spec.loader is None:
            raise SystemExit(f"Unable to load {script}")

          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          module.EXPECTED_EXAMPLES = {path.name for path in module.EXAMPLES_DIR.glob("*.cpp")}
          raise SystemExit(module.main())
          PY

  windows_plugin:
    name: Windows ${{ inputs.plugin_name }}
    needs: plugin_sanity
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve prepare paths
        id: prepare_paths
        shell: pwsh
        run: |
          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $prepareRoot = (Resolve-Path -LiteralPath (Join-Path $workspace "..")).Path
          $libsRoot = Join-Path $prepareRoot "Libraries"
          $win64Root = Join-Path $libsRoot "win64"
          $thirdPartyRoot = Join-Path $prepareRoot "ThirdParty"
          $qtRoot = Join-Path $win64Root "Qt-5.15.18"

          "prepare_root=$prepareRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "libs_root=$libsRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "win64_root=$win64Root" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "thirdparty_root=$thirdPartyRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "qt_root=$qtRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore plugin toolchain cache
        id: plugin_toolchain_cache
        uses: actions/cache/restore@v4
        with:
          key: plugin-toolchain-win64-qt5-${{ hashFiles('Telegram/build/prepare/prepare.py', 'Telegram/build/prepare/win.bat', 'Telegram/build/qt_version.py', '.github/workflows/build-plugins.yml') }}
          restore-keys: |
            plugin-toolchain-win64-qt5-
          path: |
            ${{ steps.prepare_paths.outputs.qt_root }}
            ${{ steps.prepare_paths.outputs.win64_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.win64_root }}/libwebp
            ${{ steps.prepare_paths.outputs.win64_root }}/mozjpeg
            ${{ steps.prepare_paths.outputs.win64_root }}/openssl3
            ${{ steps.prepare_paths.outputs.win64_root }}/patches
            ${{ steps.prepare_paths.outputs.win64_root }}/tg_angle
            ${{ steps.prepare_paths.outputs.win64_root }}/zlib
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/jom
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/msys64
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/NuGet
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/python

      - name: Detect warm toolchain
        id: detect_toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $requiredPaths = @(
            "${{ steps.prepare_paths.outputs.qt_root }}",
            (Join-Path "${{ steps.prepare_paths.outputs.win64_root }}" "libwebp"),
            (Join-Path "${{ steps.prepare_paths.outputs.win64_root }}" "mozjpeg"),
            (Join-Path "${{ steps.prepare_paths.outputs.win64_root }}" "openssl3"),
            (Join-Path "${{ steps.prepare_paths.outputs.win64_root }}" "tg_angle"),
            (Join-Path "${{ steps.prepare_paths.outputs.win64_root }}" "zlib"),
            (Join-Path "${{ steps.prepare_paths.outputs.thirdparty_root }}" "jom"),
            (Join-Path "${{ steps.prepare_paths.outputs.thirdparty_root }}" "msys64"),
            (Join-Path "${{ steps.prepare_paths.outputs.thirdparty_root }}" "NuGet"),
            (Join-Path "${{ steps.prepare_paths.outputs.thirdparty_root }}" "python")
          )

          $missing = New-Object System.Collections.Generic.List[string]
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $path)) {
              $missing.Add($path)
            }
          }

          $qtConfig = Get-ChildItem -Path "${{ steps.prepare_paths.outputs.qt_root }}" -Recurse -Depth 6 -File -Filter Qt5Config.cmake -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $qtConfig) {
            $missing.Add("${{ steps.prepare_paths.outputs.qt_root }}\\**\\Qt5Config.cmake")
          }

          $angleLib = Get-ChildItem -Path "${{ steps.prepare_paths.outputs.win64_root }}/tg_angle" -Recurse -File -Filter tg_angle.lib -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\Release\\' } |
            Select-Object -First 1
          if (-not $angleLib) {
            $missing.Add("${{ steps.prepare_paths.outputs.win64_root }}\\tg_angle\\**\\tg_angle.lib")
          }

          if ($missing.Count -eq 0) {
            "skip_prepare=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "[toolchain] warm cache/toolchain found, skipping prepare."
            exit 0
          }

          Write-Host "[toolchain] prepare required; missing paths:"
          $missing | ForEach-Object { Write-Host " - $_" }
          "skip_prepare=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare minimal plugin toolchain
        id: prepare_toolchain
        if: ${{ steps.detect_toolchain.outputs.skip_prepare != 'true' }}
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"

          git config --global core.longpaths true
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 30
          git config --global protocol.version 2

          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "PREPARE_LOG=%CI_LOGS_DIR%\prepare-${{ inputs.plugin_name }}.log"

          powershell -NoProfile -Command ^
            "$ErrorActionPreference = 'Stop';" ^
            "$log = $env:PREPARE_LOG;" ^
            "if (Test-Path $log) { Remove-Item $log -Force }" ^
            "New-Item -ItemType File -Path $log -Force | Out-Null;" ^
            "$cmd = 'call Telegram\\build\\prepare\\win.bat silent incremental patches msys64 python NuGet jom zlib mozjpeg openssl3 libwebp tg_angle qt_5.15.18 >> \"' + $log + '\" 2>&1';" ^
            "$proc = Start-Process -FilePath 'cmd.exe' -ArgumentList '/d','/s','/c',$cmd -WorkingDirectory $env:GITHUB_WORKSPACE -PassThru -NoNewWindow;" ^
            "$last = '';" ^
            "while (-not $proc.HasExited) {" ^
            "  Start-Sleep -Seconds 30;" ^
            "  if (Test-Path $log) {" ^
            "    $tail = (Get-Content -Path $log -Tail 40 -ErrorAction SilentlyContinue) -join \"`n\";" ^
            "    if ($tail -and $tail -ne $last) { Write-Host $tail; $last = $tail }" ^
            "  }" ^
            "}" ^
            "if (Test-Path $log) { Get-Content -Path $log -Tail 120 -ErrorAction SilentlyContinue }" ^
            "exit $proc.ExitCode"

      - name: Save plugin toolchain cache
        if: ${{ success() && steps.prepare_toolchain.conclusion == 'success' && steps.plugin_toolchain_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          key: plugin-toolchain-win64-qt5-${{ hashFiles('Telegram/build/prepare/prepare.py', 'Telegram/build/prepare/win.bat', 'Telegram/build/qt_version.py', '.github/workflows/build-plugins.yml') }}
          path: |
            ${{ steps.prepare_paths.outputs.qt_root }}
            ${{ steps.prepare_paths.outputs.win64_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.win64_root }}/libwebp
            ${{ steps.prepare_paths.outputs.win64_root }}/mozjpeg
            ${{ steps.prepare_paths.outputs.win64_root }}/openssl3
            ${{ steps.prepare_paths.outputs.win64_root }}/patches
            ${{ steps.prepare_paths.outputs.win64_root }}/tg_angle
            ${{ steps.prepare_paths.outputs.win64_root }}/zlib
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/jom
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/msys64
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/NuGet
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/python

      - name: Normalize Qt and Libraries paths
        id: normalize_paths
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Get-ExistingItem([string] $Path) {
            if ([string]::IsNullOrWhiteSpace($Path)) {
              return $null
            }
            return Get-Item -LiteralPath $Path -Force -ErrorAction SilentlyContinue
          }

          function Resolve-ExistingPath([string[]] $Candidates) {
            foreach ($candidate in $Candidates) {
              $item = Get-ExistingItem $candidate
              if ($null -ne $item) {
                return $item.FullName
              }
            }
            return $null
          }

          function Ensure-Directory([string] $Path) {
            if ([string]::IsNullOrWhiteSpace($Path)) {
              return
            }
            if ($null -eq (Get-ExistingItem $Path)) {
              New-Item -ItemType Directory -Path $Path -Force | Out-Null
            }
          }

          function Ensure-DirAlias([string] $Path, [string] $Target) {
            if ([string]::IsNullOrWhiteSpace($Path) -or [string]::IsNullOrWhiteSpace($Target)) {
              return
            }
            $targetItem = Get-ExistingItem $Target
            if ($null -eq $targetItem) {
              throw "[paths] alias target missing: $Target"
            }
            $existing = Get-ExistingItem $Path
            if ($null -ne $existing) {
              Write-Host "[paths] present: $Path"
              return
            }
            $parentDir = Split-Path -Parent $Path
            if (-not [string]::IsNullOrWhiteSpace($parentDir)) {
              Ensure-Directory $parentDir
            }
            New-Item -ItemType Junction -Path $Path -Target $targetItem.FullName | Out-Null
            Write-Host "[paths] linked $Path -> $($targetItem.FullName)"
          }

          function Find-QtDir([string[]] $Roots, [string] $Name) {
            $uniqueRoots = @($Roots | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique)
            foreach ($root in $uniqueRoots) {
              $direct = Resolve-ExistingPath @((Join-Path $root $Name))
              if ($direct) {
                return $direct
              }
            }
            foreach ($root in $uniqueRoots) {
              $rootItem = Get-ExistingItem $root
              if ($null -eq $rootItem) {
                continue
              }
              $found = Get-ChildItem -LiteralPath $rootItem.FullName -Directory -Recurse -Depth 3 -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -eq $Name } |
                Select-Object -First 1
              if ($found) {
                return $found.FullName
              }
            }
            return $null
          }

          function Find-QtPrefix([string[]] $Candidates) {
            $uniqueCandidates = @($Candidates | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique)
            foreach ($candidate in $uniqueCandidates) {
              $configPath = Join-Path $candidate "lib/cmake/Qt5/Qt5Config.cmake"
              if (Test-Path -LiteralPath $configPath) {
                return $candidate
              }
            }
            foreach ($candidate in $uniqueCandidates) {
              $item = Get-ExistingItem $candidate
              if ($null -eq $item) {
                continue
              }
              $config = Get-ChildItem -LiteralPath $item.FullName -Recurse -Depth 6 -File -Filter Qt5Config.cmake -ErrorAction SilentlyContinue |
                Select-Object -First 1
              if ($config) {
                $qt5Dir = Split-Path -Parent $config.FullName
                $cmakeDir = Split-Path -Parent $qt5Dir
                $libDir = Split-Path -Parent $cmakeDir
                return Split-Path -Parent $libDir
              }
            }
            return $null
          }

          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $parent = (Resolve-Path -LiteralPath (Join-Path $workspace "..")).Path
          $libsRoot = Join-Path $parent "Libraries"
          $libsWin64 = Join-Path $libsRoot "win64"
          $workspaceLibs = Join-Path $workspace "Libraries"
          $workspaceWin64 = Join-Path $workspaceLibs "win64"

          $rootCandidates = @($libsRoot, $workspaceLibs)
          foreach ($base in @($parent, $workspace)) {
            if ($null -ne (Get-ExistingItem $base)) {
              $rootCandidates += @(Get-ChildItem -LiteralPath $base -Directory -Filter Libraries -Recurse -Depth 2 -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty FullName)
            }
          }
          $actualRoot = Resolve-ExistingPath $rootCandidates
          if (-not $actualRoot) {
            throw "[paths] Libraries root not found near $workspace"
          }

          Ensure-DirAlias $libsRoot $actualRoot
          $actualRoot = Resolve-ExistingPath @($libsRoot, $workspaceLibs, $actualRoot)
          Ensure-DirAlias $workspaceLibs $actualRoot

          $actualWin64 = Resolve-ExistingPath @($libsWin64, $workspaceWin64, (Join-Path $actualRoot "win64"))
          if ($actualWin64) {
            Ensure-DirAlias $libsWin64 $actualWin64
            Ensure-DirAlias $workspaceWin64 $libsWin64
          }

          $qtName = "Qt-5.15.18"
          $qtPath = Find-QtDir @($libsWin64, $libsRoot, $workspaceWin64, $workspaceLibs, $actualWin64, $actualRoot) $qtName
          if (-not $qtPath) {
            throw "[paths] $qtName was not found after prepare"
          }

          Ensure-DirAlias (Join-Path $libsWin64 $qtName) $qtPath
          Ensure-DirAlias (Join-Path $libsRoot $qtName) (Join-Path $libsWin64 $qtName)
          Ensure-DirAlias (Join-Path $workspaceWin64 $qtName) (Join-Path $libsWin64 $qtName)
          Ensure-DirAlias (Join-Path $workspaceLibs $qtName) (Join-Path $libsRoot $qtName)
          Write-Host "[paths] Qt ready at $qtPath"

          $qtPrefix = Find-QtPrefix @(
            $qtPath,
            (Join-Path $qtPath "qtbase"),
            (Join-Path $libsWin64 "qt_5.15.18"),
            (Join-Path $libsWin64 "qt_5.15.18/qtbase"),
            (Join-Path $workspaceWin64 "qt_5.15.18"),
            (Join-Path $workspaceWin64 "qt_5.15.18/qtbase"),
            $libsWin64,
            $workspaceWin64)

          if (-not $qtPrefix) {
            throw "[paths] Qt5Config.cmake was not found under resolved Qt roots"
          }

          "qt_prefix_path=$qtPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "[paths] Qt prefix for CMake: $qtPrefix"

      - name: Create Qt ANGLE link aliases
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $qtLibDir = Join-Path "${{ steps.normalize_paths.outputs.qt_prefix_path }}" "lib"
          $angleLib = Join-Path "${{ steps.prepare_paths.outputs.win64_root }}" "tg_angle/out/Release/tg_angle.lib"

          if (-not (Test-Path -LiteralPath $angleLib)) {
            $found = Get-ChildItem -Path "${{ steps.prepare_paths.outputs.win64_root }}/tg_angle" -Recurse -File -Filter tg_angle.lib -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\Release\\' } |
              Select-Object -First 1
            if ($found) {
              $angleLib = $found.FullName
            }
          }

          if (-not (Test-Path -LiteralPath $angleLib)) {
            throw "[angle] tg_angle.lib was not found"
          }

          New-Item -ItemType Directory -Path $qtLibDir -Force | Out-Null
          foreach ($alias in @("libEGL.lib", "libGLESv2.lib")) {
            Copy-Item -LiteralPath $angleLib -Destination (Join-Path $qtLibDir $alias) -Force
          }

      - name: Configure plugin catalog
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "BUILD_DIR=out\plugin-${{ inputs.plugin_name }}"
          set "CONFIGURE_LOG=%CI_LOGS_DIR%\configure-${{ inputs.plugin_name }}.log"
          cmake -S PluginCatalog -B "%BUILD_DIR%" -G "Visual Studio 17 2022" -A x64 -D CMAKE_PREFIX_PATH="${{ steps.normalize_paths.outputs.qt_prefix_path }}" -D TGD_CATALOG_PLUGIN="${{ inputs.plugin_name }}" > "%CONFIGURE_LOG%" 2>&1
          if not errorlevel 1 exit /b 0
          powershell -NoProfile -Command "Get-Content -Path '%CONFIGURE_LOG%' -Tail 120"
          exit /b 1

      - name: Build plugin catalog
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "BUILD_DIR=out\plugin-${{ inputs.plugin_name }}"
          set "BUILD_LOG=%CI_LOGS_DIR%\build-${{ inputs.plugin_name }}.log"
          cmake --build "%BUILD_DIR%" --config Release --target plugin_catalog > "%BUILD_LOG%" 2>&1
          if not errorlevel 1 exit /b 0
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG%' -Tail 120"
          exit /b 1

      - name: Upload diagnostics logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: plugin-ci-logs-${{ inputs.plugin_name }}
          path: |
            ci-logs/*.log
          if-no-files-found: ignore

      - name: Collect plugin outputs
        id: collect_plugins
        shell: pwsh
        run: |
          $pluginDir = Join-Path $PWD "PluginCatalog/${{ inputs.plugin_name }}"
          $matches = Get-ChildItem -Path $pluginDir -Recurse -File -Filter *.tgd -ErrorAction SilentlyContinue |
            Sort-Object FullName -Unique

          if (-not $matches -or $matches.Count -eq 0) {
            Write-Error "Built plugin binaries were not found in $pluginDir."
            exit 1
          }

          Write-Host "Built $($matches.Count) plugin binaries for ${{ inputs.plugin_name }}."
          $matches | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Upload plugin artifact
        if: ${{ steps.collect_plugins.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: telegram-plugin-${{ inputs.plugin_name }}-windows
          path: |
            PluginCatalog/${{ inputs.plugin_name }}/**/*.tgd
          if-no-files-found: error

      - name: Commit refreshed plugin binaries
        if: ${{ inputs.allow_commit && steps.collect_plugins.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short "PluginCatalog/${{ inputs.plugin_name }}" || true
          git add -A "PluginCatalog/${{ inputs.plugin_name }}"
          git status --short "PluginCatalog/${{ inputs.plugin_name }}" || true
          if git diff --cached --quiet; then
            echo "No plugin catalog changes to commit."
            exit 0
          fi
          git commit -m "ci: refresh ${{ inputs.plugin_name }} plugin binary [skip plugin-catalog]"
          git push origin HEAD:${{ inputs.target_branch }}
