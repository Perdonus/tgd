name: Build Plugin Catalog

on:
  workflow_dispatch:
  push:
    branches:
      - Plugins

permissions:
  contents: write

concurrency:
  group: build-plugin-catalog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows_plugins:
    name: Windows plugin catalog
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip plugin-catalog]') }}
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve prepare paths
        id: prepare_paths
        shell: pwsh
        run: |
          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $prepareRoot = (Resolve-Path -LiteralPath (Join-Path $workspace "..")).Path
          $libsRoot = Join-Path $prepareRoot "Libraries"
          $win64Root = Join-Path $libsRoot "win64"
          $thirdPartyRoot = Join-Path $prepareRoot "ThirdParty"
          $qtRoot = Join-Path $win64Root "Qt-5.15.18"

          "prepare_root=$prepareRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "libs_root=$libsRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "win64_root=$win64Root" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "thirdparty_root=$thirdPartyRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "qt_root=$qtRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore plugin toolchain cache
        id: plugin_toolchain_cache
        uses: actions/cache/restore@v4
        with:
          key: plugin-toolchain-win64-qt5-${{ hashFiles('Telegram/build/prepare/prepare.py', 'Telegram/build/prepare/win.bat', 'Telegram/build/qt_version.py', '.github/workflows/build-plugins.yml') }}
          restore-keys: |
            plugin-toolchain-win64-qt5-
          path: |
            ${{ steps.prepare_paths.outputs.qt_root }}
            ${{ steps.prepare_paths.outputs.win64_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.win64_root }}/libwebp
            ${{ steps.prepare_paths.outputs.win64_root }}/mozjpeg
            ${{ steps.prepare_paths.outputs.win64_root }}/openssl3
            ${{ steps.prepare_paths.outputs.win64_root }}/patches
            ${{ steps.prepare_paths.outputs.win64_root }}/tg_angle
            ${{ steps.prepare_paths.outputs.win64_root }}/zlib
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/jom
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/msys64
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/NuGet
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/python

      - name: Prepare minimal plugin toolchain
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"

          git config --global core.longpaths true
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 30
          git config --global protocol.version 2

          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "PREPARE_LOG=%CI_LOGS_DIR%\prepare-plugin-toolchain.log"

          powershell -NoProfile -Command ^
            "$ErrorActionPreference = 'Stop';" ^
            "$log = $env:PREPARE_LOG;" ^
            "if (Test-Path $log) { Remove-Item $log -Force }" ^
            "New-Item -ItemType File -Path $log -Force | Out-Null;" ^
            "$cmd = 'call Telegram\\build\\prepare\\win.bat silent incremental patches msys64 python NuGet jom zlib mozjpeg openssl3 libwebp tg_angle qt_5.15.18 >> \"' + $log + '\" 2>&1';" ^
            "$proc = Start-Process -FilePath 'cmd.exe' -ArgumentList '/d','/s','/c',$cmd -WorkingDirectory $env:GITHUB_WORKSPACE -PassThru -NoNewWindow;" ^
            "$last = '';" ^
            "while (-not $proc.HasExited) {" ^
            "  Start-Sleep -Seconds 60;" ^
            "  if (Test-Path $log) {" ^
            "    $tail = (Get-Content -Path $log -Tail 40 -ErrorAction SilentlyContinue) -join \"`n\";" ^
            "    if ($tail -and $tail -ne $last) { Write-Host $tail; $last = $tail }" ^
            "  }" ^
            "}" ^
            "if (Test-Path $log) { Get-Content -Path $log -Tail 120 -ErrorAction SilentlyContinue }" ^
            "exit $proc.ExitCode"

      - name: Save plugin toolchain cache
        if: ${{ success() && steps.plugin_toolchain_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          key: plugin-toolchain-win64-qt5-${{ hashFiles('Telegram/build/prepare/prepare.py', 'Telegram/build/prepare/win.bat', 'Telegram/build/qt_version.py', '.github/workflows/build-plugins.yml') }}
          path: |
            ${{ steps.prepare_paths.outputs.qt_root }}
            ${{ steps.prepare_paths.outputs.win64_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.win64_root }}/libwebp
            ${{ steps.prepare_paths.outputs.win64_root }}/mozjpeg
            ${{ steps.prepare_paths.outputs.win64_root }}/openssl3
            ${{ steps.prepare_paths.outputs.win64_root }}/patches
            ${{ steps.prepare_paths.outputs.win64_root }}/tg_angle
            ${{ steps.prepare_paths.outputs.win64_root }}/zlib
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/jom
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/msys64
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/NuGet
            ${{ steps.prepare_paths.outputs.thirdparty_root }}/python

      - name: Configure plugin catalog
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          cmake -S PluginCatalog -B out\plugin-catalog -G "Visual Studio 17 2022" -A x64 -D CMAKE_PREFIX_PATH="${{ steps.prepare_paths.outputs.qt_root }}"

      - name: Build plugin catalog
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "BUILD_LOG=%CI_LOGS_DIR%\build-plugin-catalog.log"
          cmake --build out\plugin-catalog --config Release --target plugin_catalog > "%BUILD_LOG%" 2>&1
          if not errorlevel 1 exit /b 0
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG%' -Tail 120"
          exit /b 1

      - name: Upload diagnostics logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: plugin-ci-logs
          path: |
            ci-logs/*.log
          if-no-files-found: ignore

      - name: Collect plugin outputs
        id: collect_plugins
        shell: pwsh
        run: |
          $matches = Get-ChildItem -Path "$PWD/PluginCatalog" -Recurse -File -Filter *.tgd -ErrorAction SilentlyContinue |
            Sort-Object FullName -Unique

          if (-not $matches -or $matches.Count -eq 0) {
            Write-Error "Built plugin binaries were not found in PluginCatalog."
            exit 1
          }

          Write-Host "Built $($matches.Count) plugin binaries."
          $matches | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Upload plugin catalog artifact
        if: ${{ steps.collect_plugins.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: telegram-plugin-catalog-windows
          path: |
            PluginCatalog/**/*.tgd
          if-no-files-found: error

      - name: Commit refreshed plugin binaries
        if: ${{ steps.collect_plugins.outcome == 'success' && github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short PluginCatalog || true
          git add -A PluginCatalog
          git status --short PluginCatalog || true
          if git diff --cached --quiet; then
            echo "No plugin catalog changes to commit."
            exit 0
          fi
          git commit -m "ci: refresh plugin catalog binaries [skip plugin-catalog]"
          git push origin HEAD:Plugins
