name: Quick Plugin Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "PluginCatalog/**"
      - "PluginCatalog/CMakeLists.txt"
      - "Telegram/SourceFiles/plugins/**"
      - "Telegram/Plugins/Examples/transparent_telegram.cpp"
      - "Telegram/Plugins/Examples/ai_chat.cpp"
      - "Telegram/SourceFiles/settings/settings_plugins.cpp"
      - ".github/workflows/quick-plugin-checks.yml"
  pull_request:
    paths:
      - "PluginCatalog/**"
      - "PluginCatalog/CMakeLists.txt"
      - "Telegram/SourceFiles/plugins/**"
      - "Telegram/Plugins/Examples/transparent_telegram.cpp"
      - "Telegram/Plugins/Examples/ai_chat.cpp"
      - "Telegram/SourceFiles/settings/settings_plugins.cpp"
      - ".github/workflows/quick-plugin-checks.yml"

permissions:
  contents: read

jobs:
  plugin_sanity:
    name: Plugin Sanity (no build)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run plugin sanity checks
        run: |
          python3 - <<'PY'
          import importlib.util
          import pathlib
          import sys

          root = pathlib.Path.cwd()
          script = root / "tools" / "plugin_sanity_check.py"
          spec = importlib.util.spec_from_file_location("plugin_sanity_check", script)
          if spec is None or spec.loader is None:
            raise SystemExit(f"Unable to load {script}")

          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          module.EXPECTED_EXAMPLES = {path.name for path in module.EXAMPLES_DIR.glob("*.cpp")}
          raise SystemExit(module.main())
          PY
