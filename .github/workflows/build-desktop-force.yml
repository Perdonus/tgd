name: Build Astrogram Desktop Force
# Force workflow mirrors the main Windows pipeline but remains independently rerunnable.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-desktop.yml'
      - '.github/workflows/build-desktop-force.yml'
      - 'Telegram/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'lib/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BETA_FEED_BRANCH: updates-beta

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows (preferred)
    runs-on: windows-2022
    timeout-minutes: 360
    outputs:
      build_ok: ${{ steps.locate_exe.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve prepare paths
        id: prepare_paths
        shell: pwsh
        run: |
          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $prepareRoot = (Resolve-Path -LiteralPath (Join-Path $workspace "..")).Path
          $libsRoot = Join-Path $prepareRoot "Libraries"
          $win64Root = Join-Path $libsRoot "win64"
          $thirdPartyRoot = Join-Path $prepareRoot "ThirdParty"

          "prepare_root=$prepareRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "libs_root=$libsRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "win64_root=$win64Root" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "thirdparty_root=$thirdPartyRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore desktop source mirrors cache
        id: desktop_sources_cache
        uses: actions/cache/restore@v4
        with:
          key: desktop-source-mirrors-win64-v1-${{ hashFiles('.gitmodules', '.github/workflows/build-desktop.yml', '.github/workflows/build-desktop-force.yml') }}
          restore-keys: |
            desktop-source-mirrors-win64-v1-
          path: |
            cmake
            Telegram/codegen
            Telegram/lib_*
            Telegram/ThirdParty

      - name: Restore desktop toolchain cache
        id: desktop_toolchain_cache
        uses: actions/cache/restore@v4
        with:
          key: desktop-toolchain-win64-v1-${{ hashFiles('Telegram/build/prepare/prepare.py', 'Telegram/build/prepare/win.bat', 'Telegram/build/qt_version.py') }}
          restore-keys: |
            desktop-toolchain-win64-v1-
          path: |
            ${{ steps.prepare_paths.outputs.win64_root }}
            ${{ steps.prepare_paths.outputs.libs_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.thirdparty_root }}

      - name: Check restored toolchain cache
        id: toolchain_state
        shell: pwsh
        run: |
          $qtCore = Join-Path '${{ steps.prepare_paths.outputs.win64_root }}' 'Qt-5.15.18/lib/Qt5Core.lib'
          $thirdPartyPython = Join-Path '${{ steps.prepare_paths.outputs.thirdparty_root }}' 'python/Scripts/python.exe'
          $ready = ('${{ steps.desktop_toolchain_cache.outputs.cache-hit }}' -eq 'true') -and (Test-Path -LiteralPath $qtCore) -and (Test-Path -LiteralPath $thirdPartyPython)
          "ready=$($ready.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "[toolchain] cache-hit=${{ steps.desktop_toolchain_cache.outputs.cache-hit }} ready=$ready"

      - name: Download prebuilt Windows deps bundle
        id: prebuilt_deps
        if: ${{ steps.toolchain_state.outputs.ready != 'true' || steps.desktop_sources_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./.github/scripts/download-prebuilt-win-deps.ps1 -PrepareRoot '${{ steps.prepare_paths.outputs.prepare_root }}'

      - name: Setup sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure build acceleration
        shell: pwsh
        run: |
          $sccache = Get-Command sccache -ErrorAction SilentlyContinue
          if ($sccache) {
            "ASTROGRAM_USE_SCCACHE=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "SCCACHE_GHA_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "SCCACHE_CACHE_SIZE=10G" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "SCCACHE_IGNORE_SERVER_IO_ERROR=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "ASTROGRAM_USE_SCCACHE=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Warning "sccache is not available; continuing without compiler launcher."
          }
          $buildJobs = 2
          "CMAKE_BUILD_PARALLEL_LEVEL=$buildJobs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare dependencies (Windows)
        id: prepare
        if: ${{ steps.prebuilt_deps.outputs.ready != 'true' && steps.toolchain_state.outputs.ready != 'true' }}
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"

          git config --global core.longpaths true
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 30
          git config --global protocol.version 2

          set "PREPARE_MAX_TRIES=1"
          set "PREPARE_TRY=1"
          :prepare_retry
          echo [prepare] attempt !PREPARE_TRY! of !PREPARE_MAX_TRIES!
          powershell -NoProfile -Command "$p = Start-Process -FilePath 'cmd.exe' -ArgumentList '/d','/s','/c','call Telegram\\build\\prepare\\win.bat silent incremental' -WorkingDirectory $env:GITHUB_WORKSPACE -PassThru -NoNewWindow; if (-not $p.WaitForExit(10800 * 1000)) { Write-Host '[prepare] timed out after 10800s'; try { $p.Kill($true) } catch {}; exit 124 }; exit $p.ExitCode"
          if not errorlevel 1 goto prepare_ok
          if !PREPARE_TRY! GEQ !PREPARE_MAX_TRIES! (
            echo [prepare] failed after !PREPARE_TRY! attempts
            exit /b 1
          )
          echo [prepare] failed, retry in 20s (transient network/proxy errors are common)
          timeout /t 20 /nobreak >nul
          set /a PREPARE_TRY+=1
          goto prepare_retry
          :prepare_ok

      - name: Save desktop toolchain cache
        if: ${{ success() && steps.desktop_toolchain_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          key: desktop-toolchain-win64-v1-${{ hashFiles('Telegram/build/prepare/prepare.py', 'Telegram/build/prepare/win.bat', 'Telegram/build/qt_version.py') }}
          path: |
            ${{ steps.prepare_paths.outputs.win64_root }}
            ${{ steps.prepare_paths.outputs.libs_root }}/cache_keys
            ${{ steps.prepare_paths.outputs.thirdparty_root }}

      - name: Ensure cmake submodule
        id: ensure_cmake
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          set "CMAKE_HELPERS_SHA=ba366ade3e70c64d1dd854382abd74f532ba41a1"
          set "CMAKE_HEAD="
          if exist cmake\.git if exist cmake\run_cmake.py (
            for /f %%i in ('git -C cmake rev-parse HEAD 2^>nul') do set "CMAKE_HEAD=%%i"
          )
          if /I "!CMAKE_HEAD!"=="%CMAKE_HELPERS_SHA%" goto cmake_submodule_ok

          set "CMAKE_SUBMODULE_MAX_TRIES=3"
          set "CMAKE_SUBMODULE_TRY=1"
          :cmake_submodule_retry
          echo [cmake-submodule] attempt !CMAKE_SUBMODULE_TRY! of !CMAKE_SUBMODULE_MAX_TRIES!
          if exist cmake rmdir /Q /S cmake
          git -c init.defaultBranch=__codex__ init cmake
          if errorlevel 1 exit /b 1
          git -C cmake remote add origin https://github.com/desktop-app/cmake_helpers.git
          if errorlevel 1 exit /b 1
          git -C cmake fetch --depth 1 origin %CMAKE_HELPERS_SHA%
          if errorlevel 1 exit /b 1
          git -C cmake checkout --detach FETCH_HEAD
          if errorlevel 1 exit /b 1
          if exist cmake\run_cmake.py (
            for /f %%i in ('git -C cmake rev-parse HEAD 2^>nul') do set "CMAKE_HEAD=%%i"
          )
          if /I "!CMAKE_HEAD!"=="%CMAKE_HELPERS_SHA%" goto cmake_submodule_ok
          if !CMAKE_SUBMODULE_TRY! GEQ !CMAKE_SUBMODULE_MAX_TRIES! (
            echo [cmake-submodule] cmake\\run_cmake.py is still missing
            if exist cmake (
              echo [cmake-submodule] cmake directory snapshot:
              dir /b cmake
            )
            exit /b 1
          )
          timeout /t 10 /nobreak >nul
          set /a CMAKE_SUBMODULE_TRY+=1
          goto cmake_submodule_retry
          :cmake_submodule_ok
          echo [cmake-submodule] ready: cmake\run_cmake.py
          exit /b 0

      - name: Ensure required source mirrors
        id: ensure_sources
        shell: pwsh
        run: |
          $moduleLines = @(git config -f .gitmodules --get-regexp "^submodule\..*\.path$")
          if (-not $moduleLines -or $moduleLines.Count -eq 0) {
            throw "[sources] no entries found in .gitmodules"
          }

          # Pin mirrors to the upstream telegramdesktop/tdesktop v6.4.2 snapshot.
          $moduleShas = @{
            "Telegram/ThirdParty/GSL" = "87f9d768866548b5b86e72be66c60c5abd4d9b37"
            "Telegram/ThirdParty/QR" = "720f62bddb7226106071d4728c292cb1df519ceb"
            "Telegram/ThirdParty/cld3" = "b48dc46512566f5a2d41118c8c1116c4f96dc661"
            "Telegram/ThirdParty/dispatch" = "886ca22f659c53dae66a40ee8266c7aae9bb97cd"
            "Telegram/ThirdParty/expected" = "292eff8bd8ee230a7df1d6a1c00c4ea0eb2f0362"
            "Telegram/ThirdParty/fcitx5-qt" = "c743b12e6780edf1dcfe9071531c80f050cacb95"
            "Telegram/ThirdParty/hime" = "9b3e6f9ab59d1fe4d9de73d3bf0fed7789f921c5"
            "Telegram/ThirdParty/hunspell" = "22c3381e2066bed616250d373fc5c935598b564a"
            "Telegram/ThirdParty/kcoreaddons" = "fd84da51b554eac25e35b1e3f373edaab3029b15"
            "Telegram/ThirdParty/kimageformats" = "df82311a1081e576c4ac020204578bb8a81b21ec"
            "Telegram/ThirdParty/libprisma" = "23b0d70f9709da9b38561d5706891a134d18df76"
            "Telegram/ThirdParty/lz4" = "5ff839680134437dbf4678f3d0c7b371d84f4964"
            "Telegram/ThirdParty/nimf" = "498ec7ffab3ac140c2469638a14451788f03e798"
            "Telegram/ThirdParty/range-v3" = "a81477931a8aa2ad025c6bda0609f38e09e4d7ec"
            "Telegram/ThirdParty/rlottie" = "8c69fc20cf2e150db304311f1233a4b55a8892d7"
            "Telegram/ThirdParty/tgcalls" = "24876ebca7da10f92dc972225734337f9e793054"
            "Telegram/ThirdParty/xdg-desktop-portal" = "23a76c392170dbbd26230f85ef56c3a57e52b857"
            "Telegram/ThirdParty/xxHash" = "bbb27a5efb85b92a0486cf361a8635715a53f6ba"
            "Telegram/codegen" = "b7517766603d28138d1c8b2743febe754f6f6986"
            "Telegram/lib_base" = "cca87bd2fb4f83bb3fc45d8b59ed8f1d9429d78b"
            "Telegram/lib_crl" = "a41edfcfa8c04057deb8a1a38fca145248a9421a"
            "Telegram/lib_lottie" = "99d8cc4d1820960fbcdafc574f1894073b14b75a"
            "Telegram/lib_qr" = "6fdf60461444ba150e13ac36009c0ffce72c4c83"
            "Telegram/lib_rpl" = "c57cccffb01d85570decd7fccb88419c9a682e63"
            "Telegram/lib_spellcheck" = "476bb43025449ccbd815a14895e9321695a1a177"
            "Telegram/lib_storage" = "ccdc72548a5065b5991b4e06e610d76bc4f6023e"
            "Telegram/lib_tl" = "ba165de0c82be118e66310a94f114a3e342bcadb"
            "Telegram/lib_ui" = "50490486d12b486fb27a09e844ba3adbaca66a3e"
            "Telegram/lib_webrtc" = "553102f8c244609253720e7a03c2ea2d3c7fee8e"
            "Telegram/lib_webview" = "b4a0af279bb55e1caeec3d5f82edae699c3ab251"
          }

          foreach ($line in $moduleLines) {
            $parts = $line -split '\s+', 2
            if ($parts.Count -lt 2) {
              continue
            }

            $pathKey = $parts[0]
            $modulePath = $parts[1].Trim()
            if ([string]::IsNullOrWhiteSpace($modulePath)) {
              continue
            }
            if ($modulePath -eq "cmake") {
              Write-Host "[sources] skip submodule handled separately: $modulePath"
              continue
            }

            $modulePrefix = $pathKey.Substring(0, $pathKey.Length - 5)
            $moduleUrl = (git config -f .gitmodules --get "$modulePrefix.url").Trim()
            if ([string]::IsNullOrWhiteSpace($moduleUrl)) {
              throw "[sources] url missing for $modulePath"
            }
            $moduleSha = $moduleShas[$modulePath]

            $target = Join-Path $env:GITHUB_WORKSPACE $modulePath
            if (Test-Path -LiteralPath $target) {
              if (Test-Path -LiteralPath (Join-Path $target ".git")) {
                & git -C $target remote set-url origin $moduleUrl *> $null
                if ($LASTEXITCODE -eq 0) {
                  if ([string]::IsNullOrWhiteSpace($moduleSha)) {
                    Write-Host "[sources] ok: $modulePath"
                    continue
                  }
                  $head = (& git -C $target rev-parse HEAD 2>$null).Trim()
                  if ($LASTEXITCODE -eq 0 -and $head -eq $moduleSha) {
                    Write-Host "[sources] ok: $modulePath @ $head"
                    continue
                  }
                  Write-Host "[sources] update pinned: $modulePath @ $moduleSha"
                  & git -C $target fetch --depth 1 origin $moduleSha
                  if ($LASTEXITCODE -eq 0) {
                    & git -C $target checkout --detach FETCH_HEAD
                    if ($LASTEXITCODE -eq 0) {
                      continue
                    }
                  }
                }
              }
              Remove-Item -LiteralPath $target -Recurse -Force
            }
            if ([string]::IsNullOrWhiteSpace($moduleSha)) {
              Write-Host "[sources] clone HEAD: $modulePath"
              git clone --depth 1 --filter=blob:none $moduleUrl $target
              if ($LASTEXITCODE -ne 0) {
                throw "[sources] failed to clone $moduleUrl -> $modulePath"
              }
              continue
            }

            Write-Host "[sources] checkout pinned: $modulePath @ $moduleSha"
            git -c init.defaultBranch=__codex__ init $target
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to init repo for $modulePath"
            }
            git -C $target remote add origin $moduleUrl
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to add origin for $modulePath"
            }
            git -C $target fetch --depth 1 origin $moduleSha
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to fetch $moduleSha for $modulePath"
            }
            git -C $target checkout --detach FETCH_HEAD
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to checkout $moduleSha for $modulePath"
            }
          }

      - name: Save desktop source mirrors cache
        if: ${{ success() && steps.desktop_sources_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          key: desktop-source-mirrors-win64-v1-${{ hashFiles('.gitmodules', '.github/workflows/build-desktop.yml', '.github/workflows/build-desktop-force.yml') }}
          path: |
            cmake
            Telegram/codegen
            Telegram/lib_*
            Telegram/ThirdParty

      - name: Normalize Qt and Libraries paths
        id: normalize_paths
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Get-ExistingItem([string] $Path) {
            if ([string]::IsNullOrWhiteSpace($Path)) {
              return $null
            }
            return Get-Item -LiteralPath $Path -Force -ErrorAction SilentlyContinue
          }

          function Resolve-ExistingPath([string[]] $Candidates) {
            foreach ($candidate in $Candidates) {
              $item = Get-ExistingItem $candidate
              if ($null -ne $item) {
                return $item.FullName
              }
            }
            return $null
          }

          function Ensure-Directory([string] $Path) {
            if ([string]::IsNullOrWhiteSpace($Path)) {
              return
            }
            if ($null -eq (Get-ExistingItem $Path)) {
              New-Item -ItemType Directory -Path $Path -Force | Out-Null
            }
          }

          function Ensure-DirAlias([string] $Path, [string] $Target) {
            if ([string]::IsNullOrWhiteSpace($Path) -or [string]::IsNullOrWhiteSpace($Target)) {
              return
            }
            $targetItem = Get-ExistingItem $Target
            if ($null -eq $targetItem) {
              throw "[paths] alias target missing: $Target"
            }
            $existing = Get-ExistingItem $Path
            if ($null -ne $existing) {
              Write-Host "[paths] present: $Path"
              return
            }
            $parentDir = Split-Path -Parent $Path
            if (-not [string]::IsNullOrWhiteSpace($parentDir)) {
              Ensure-Directory $parentDir
            }
            New-Item -ItemType Junction -Path $Path -Target $targetItem.FullName | Out-Null
            Write-Host "[paths] linked $Path -> $($targetItem.FullName)"
          }

          function Find-QtDir([string[]] $Roots, [string] $Name) {
            $uniqueRoots = @($Roots | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique)
            foreach ($root in $uniqueRoots) {
              $direct = Resolve-ExistingPath @((Join-Path $root $Name))
              if ($direct) {
                return $direct
              }
            }
            foreach ($root in $uniqueRoots) {
              $rootItem = Get-ExistingItem $root
              if ($null -eq $rootItem) {
                continue
              }
              $found = Get-ChildItem -LiteralPath $rootItem.FullName -Directory -Recurse -Depth 3 -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -eq $Name } |
                Select-Object -First 1
              if ($found) {
                return $found.FullName
              }
            }
            return $null
          }

          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $parent = (Resolve-Path -LiteralPath (Join-Path $workspace "..")).Path
          $libsRoot = Join-Path $parent "Libraries"
          $libsWin64 = Join-Path $libsRoot "win64"
          $workspaceLibs = Join-Path $workspace "Libraries"
          $workspaceWin64 = Join-Path $workspaceLibs "win64"

          $rootCandidates = @($libsRoot, $workspaceLibs)
          foreach ($base in @($parent, $workspace)) {
            if ($null -ne (Get-ExistingItem $base)) {
              $rootCandidates += @(Get-ChildItem -LiteralPath $base -Directory -Filter Libraries -Recurse -Depth 2 -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty FullName)
            }
          }
          $actualRoot = Resolve-ExistingPath $rootCandidates

          if (-not $actualRoot) {
            Write-Host "[paths] parent snapshot:"
            Get-ChildItem -LiteralPath $parent -Force -ErrorAction SilentlyContinue | Select-Object -First 60 FullName
            Write-Host "[paths] workspace snapshot:"
            Get-ChildItem -LiteralPath $workspace -Force -ErrorAction SilentlyContinue | Select-Object -First 60 FullName
            throw "[paths] Libraries root not found near $workspace"
          }

          Ensure-DirAlias $libsRoot $actualRoot
          $actualRoot = Resolve-ExistingPath @($libsRoot, $workspaceLibs, $actualRoot)
          Ensure-DirAlias $workspaceLibs $actualRoot

          $qtVersions = @("Qt-5.15.18", "Qt-6.10.1")
          $actualWin64 = Resolve-ExistingPath @($libsWin64, $workspaceWin64, (Join-Path $actualRoot "win64"))
          if (-not $actualWin64) {
            foreach ($qtName in $qtVersions) {
              $qtHit = Find-QtDir @($actualRoot, $workspaceLibs, $libsRoot) $qtName
              if ($qtHit) {
                $actualWin64 = Split-Path -Parent $qtHit
                break
              }
            }
          }

          if ($actualWin64) {
            Ensure-DirAlias $libsWin64 $actualWin64
            Ensure-DirAlias $workspaceWin64 $libsWin64
          }

          $foundQt = $false
          foreach ($qtName in $qtVersions) {
            $qtPath = Find-QtDir @($libsWin64, $libsRoot, $workspaceWin64, $workspaceLibs, $actualWin64, $actualRoot) $qtName
            if (-not $qtPath) {
              continue
            }
            $foundQt = $true
            Ensure-DirAlias (Join-Path $libsWin64 $qtName) $qtPath
            Ensure-DirAlias (Join-Path $libsRoot $qtName) (Join-Path $libsWin64 $qtName)
            Ensure-DirAlias (Join-Path $workspaceWin64 $qtName) (Join-Path $libsWin64 $qtName)
            Ensure-DirAlias (Join-Path $workspaceLibs $qtName) (Join-Path $libsRoot $qtName)
            Write-Host "[paths] Qt candidate present: $qtName at $qtPath"
          }

          if (-not $foundQt) {
            Write-Host "[paths] Libraries root snapshot:"
            Get-ChildItem -LiteralPath $libsRoot -Force -ErrorAction SilentlyContinue | Select-Object -First 60 FullName
            if ($null -ne (Get-ExistingItem $libsWin64)) {
              Write-Host "[paths] Libraries/win64 snapshot:"
              Get-ChildItem -LiteralPath $libsWin64 -Force -ErrorAction SilentlyContinue | Select-Object -First 80 FullName
            }
            throw "[paths] Qt directories were not found after normalization"
          }

      - name: Configure (Windows Release)
        id: configure
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%\\Telegram"

          set "CFG_OK="
          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "CFG_LOG_1=%CI_LOGS_DIR%\\configure-attempt1.log"
          set "CFG_LOG_2=%CI_LOGS_DIR%\\configure-attempt2.log"
          set "API_ID=17349"
          set "API_HASH=344583e45741c457fe1862106095a5eb"
          set "ACCEL_ARGS=-D CMAKE_POLICY_CMP0141=NEW -D CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded -D CMAKE_NINJA_FORCE_RESPONSE_FILE=ON"
          if /I "%ASTROGRAM_USE_SCCACHE%"=="1" set "ACCEL_ARGS=-D CMAKE_C_COMPILER_LAUNCHER=sccache -D CMAKE_CXX_COMPILER_LAUNCHER=sccache %ACCEL_ARGS%"

          where python
          python --version

          if exist "%GITHUB_WORKSPACE%\\out\\CMakeCache.txt" del /f /q "%GITHUB_WORKSPACE%\\out\\CMakeCache.txt"
          if exist "%GITHUB_WORKSPACE%\\out\\CMakeFiles" rmdir /Q /S "%GITHUB_WORKSPACE%\\out\\CMakeFiles"

          call configure.bat force -G "Ninja Multi-Config" %ACCEL_ARGS% -D TDESKTOP_API_TEST=ON -D TDESKTOP_API_ID=%API_ID% -D TDESKTOP_API_HASH=%API_HASH% > "%CFG_LOG_1%" 2>&1 && set "CFG_OK=1"
          if not defined CFG_OK (
            echo [configure] fast Ninja configure failed, retrying Visual Studio x64 configure
            powershell -NoProfile -Command "Get-Content -Path '%CFG_LOG_1%' -Tail 80"
            powershell -NoProfile -Command "$tail = (Get-Content -Path '%CFG_LOG_1%' -Tail 20) -join ' | '; Write-Output ('::warning title=Configure attempt1 failed::' + $tail)"
            call configure.bat x64 force %ACCEL_ARGS% -D TDESKTOP_API_ID=%API_ID% -D TDESKTOP_API_HASH=%API_HASH% > "%CFG_LOG_2%" 2>&1 && set "CFG_OK=1"
          )
          if not defined CFG_OK (
            echo [configure] all x64 configure attempts failed
            powershell -NoProfile -Command "Get-Content -Path '%CFG_LOG_2%' -Tail 80"
            powershell -NoProfile -Command "$tail = (Get-Content -Path '%CFG_LOG_2%' -Tail 30) -join ' | '; Write-Output ('::error title=Configure failed::' + $tail)"
            if exist "%GITHUB_WORKSPACE%\\cmake" (
              echo [configure] cmake helpers files:
              dir /b "%GITHUB_WORKSPACE%\\cmake"
            )
            if exist "%GITHUB_WORKSPACE%\\out" (
              echo [configure] out directory snapshot:
              dir /b "%GITHUB_WORKSPACE%\\out"
            )
            exit /b 1
          )
          exit /b 0

      - name: Fast compile precheck (changed units)
        id: fast_precheck
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $outDir = Join-Path $workspace 'out'
          $logDir = Join-Path $workspace 'ci-logs'
          if (-not (Test-Path -LiteralPath $logDir)) {
            New-Item -ItemType Directory -Path $logDir | Out-Null
          }
          $logFile = Join-Path $logDir 'fast-precheck.log'
          if (Test-Path -LiteralPath $logFile) {
            Remove-Item -LiteralPath $logFile -Force
          }

          $base = '${{ github.event.before }}'
          $head = '${{ github.sha }}'
          if ([string]::IsNullOrWhiteSpace($base) -or ($base -match '^0+$')) {
            $base = "$head~1"
          }

          $changed = @(git diff --name-only $base $head 2>$null)
          if (-not $changed -or $changed.Count -eq 0) {
            $changed = @(git diff --name-only HEAD~1 HEAD 2>$null)
          }

          $cppSet = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
          foreach ($path in $changed) {
            if ($path -match '^Telegram/SourceFiles/.*\.cpp$') {
              [void]$cppSet.Add($path)
              continue
            }
            if ($path -match '^Telegram/SourceFiles/.*\.h$') {
              $candidate = [System.IO.Path]::ChangeExtension($path, '.cpp')
              if (Test-Path -LiteralPath (Join-Path $workspace $candidate)) {
                [void]$cppSet.Add($candidate)
              }
              continue
            }
          }

          $cppList = @($cppSet)
          if ($cppList.Count -eq 0) {
            "No changed translation units in Telegram/SourceFiles; fast precheck skipped." | Tee-Object -FilePath $logFile -Append
            exit 0
          }

          ("Fast precheck units: " + $cppList.Count) | Tee-Object -FilePath $logFile -Append
          $failed = $false

          foreach ($cpp in $cppList) {
            $relativeWin = $cpp.Replace('/', '\\')
            $sourcePath = Join-Path $workspace $relativeWin
            if (-not (Test-Path -LiteralPath $sourcePath)) {
              ("[skip] source missing: " + $cpp) | Tee-Object -FilePath $logFile -Append
              continue
            }
            if (-not $relativeWin.StartsWith('Telegram\\SourceFiles\\')) {
              ("[skip] not in SourceFiles: " + $cpp) | Tee-Object -FilePath $logFile -Append
              continue
            }

            $objSuffix = $relativeWin.Substring('Telegram\\SourceFiles\\'.Length)
            $rsp = Join-Path $outDir ("Telegram\\CMakeFiles\\Telegram.dir\\Release\\SourceFiles\\" + $objSuffix + ".obj.rsp")
            if (-not (Test-Path -LiteralPath $rsp)) {
              $leaf = [System.IO.Path]::GetFileName($relativeWin) + '.obj.rsp'
              $fallback = Get-ChildItem -Path $outDir -Recurse -Filter $leaf -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($fallback) {
                $rsp = $fallback.FullName
              }
            }
            if (-not (Test-Path -LiteralPath $rsp)) {
              ("[skip] rsp not found for " + $cpp) | Tee-Object -FilePath $logFile -Append
              continue
            }

            ("[check] " + $cpp) | Tee-Object -FilePath $logFile -Append
            & cl.exe /nologo /TP "@$rsp" /Zs /c $sourcePath *>> $logFile
            if ($LASTEXITCODE -ne 0) {
              $failed = $true
              break
            }
          }

          if ($failed) {
            Write-Host "[precheck] fast compile precheck failed"
            Get-Content -Path $logFile -Tail 200
            throw "fast precheck failed"
          }

      - name: Build Telegram target (Release)
        id: build_target
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%\\Telegram"

          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "BUILD_LOG_TARGET=%CI_LOGS_DIR%\\build-target.log"
          set "BUILD_LOG_RELEASE=%CI_LOGS_DIR%\\build-release.log"
          set "BUILD_LOG_RECFG=%CI_LOGS_DIR%\\configure-attempt3.log"
          set "BUILD_LOG_VS_TARGET=%CI_LOGS_DIR%\\build-vs-target.log"
          set "BUILD_LOG_VS_RELEASE=%CI_LOGS_DIR%\\build-vs-release.log"
          set "API_ID=17349"
          set "API_HASH=344583e45741c457fe1862106095a5eb"
          set "ACCEL_ARGS=-D CMAKE_POLICY_CMP0141=NEW -D CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded -D CMAKE_NINJA_FORCE_RESPONSE_FILE=ON"
          if /I "%ASTROGRAM_USE_SCCACHE%"=="1" set "ACCEL_ARGS=-D CMAKE_C_COMPILER_LAUNCHER=sccache -D CMAKE_CXX_COMPILER_LAUNCHER=sccache %ACCEL_ARGS%"
          set "BUILD_JOBS=2"
          set "BUILD_JOBS_SAFE=1"
          if defined CL (set "CL=/Zm300 !CL!") else set "CL=/Zm300"

          cmake --build ..\out --config Release --parallel %BUILD_JOBS% --target Telegram > "%BUILD_LOG_TARGET%" 2>&1
          if not errorlevel 1 goto build_ok
          echo [build] target Telegram failed, retrying default Release build on current generator
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG_TARGET%' -Tail 120"
          powershell -NoProfile -Command "$tail = (Get-Content -Path '%BUILD_LOG_TARGET%' -Tail 40) -join ' | '; Write-Output ('::warning title=Target build failed::' + $tail)"
          cmake --build ..\out --config Release --parallel %BUILD_JOBS% > "%BUILD_LOG_RELEASE%" 2>&1
          if not errorlevel 1 goto build_ok
          echo [build] default Release build failed, reconfiguring with Visual Studio x64 fallback
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG_RELEASE%' -Tail 120"
          powershell -NoProfile -Command "$tail = (Get-Content -Path '%BUILD_LOG_RELEASE%' -Tail 40) -join ' | '; Write-Output ('::warning title=Release build failed::' + $tail)"
          if exist "%GITHUB_WORKSPACE%\\out\\CMakeCache.txt" del /f /q "%GITHUB_WORKSPACE%\\out\\CMakeCache.txt"
          if exist "%GITHUB_WORKSPACE%\\out\\CMakeFiles" rmdir /Q /S "%GITHUB_WORKSPACE%\\out\\CMakeFiles"
          call configure.bat x64 force %ACCEL_ARGS% -D TDESKTOP_API_ID=%API_ID% -D TDESKTOP_API_HASH=%API_HASH% > "%BUILD_LOG_RECFG%" 2>&1
          if errorlevel 1 (
            echo [build] Visual Studio fallback configure failed
            powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG_RECFG%' -Tail 120"
            powershell -NoProfile -Command "$tail = (Get-Content -Path '%BUILD_LOG_RECFG%' -Tail 40) -join ' | '; Write-Output ('::error title=VS fallback configure failed::' + $tail)"
            exit /b 1
          )
          cmake --build ..\out --config Release --parallel %NUMBER_OF_PROCESSORS% --target Telegram > "%BUILD_LOG_VS_TARGET%" 2>&1
          if not errorlevel 1 goto build_ok
          echo [build] Visual Studio fallback target build failed, retrying default Release build
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG_VS_TARGET%' -Tail 120"
          powershell -NoProfile -Command "$tail = (Get-Content -Path '%BUILD_LOG_VS_TARGET%' -Tail 40) -join ' | '; Write-Output ('::warning title=VS fallback target build failed::' + $tail)"
          cmake --build ..\out --config Release --parallel %NUMBER_OF_PROCESSORS% > "%BUILD_LOG_VS_RELEASE%" 2>&1
          if not errorlevel 1 goto build_ok
          echo [build] Visual Studio fallback Release build failed
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG_VS_RELEASE%' -Tail 120"
          powershell -NoProfile -Command "$tail = (Get-Content -Path '%BUILD_LOG_VS_RELEASE%' -Tail 40) -join ' | '; Write-Output ('::error title=VS fallback release build failed::' + $tail)"
          exit /b 1
          :build_ok
          exit /b 0

      - name: Show sccache stats
        if: ${{ always() && steps.build_target.outcome == 'success' }}
        shell: pwsh
        run: |
          if ($env:SCCACHE_PATH) {
            & $env:SCCACHE_PATH --show-stats
          } elseif (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats
          } else {
            Write-Warning "sccache is not available; stats skipped."
          }

      - name: Upload diagnostics logs
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-logs
          path: |
            ci-logs/*.log
          if-no-files-found: ignore

      - name: Locate built EXE
        if: ${{ always() && steps.build_target.outcome == 'success' }}
        id: locate_exe
        shell: pwsh
        run: |
          $roots = @(
            "$PWD/out",
            "$PWD/Telegram/out",
            "$PWD/out/Release",
            "$PWD/out/Debug",
            "$PWD/../out",
            "$PWD/../../out",
            "$PWD/../tgd/out",
            "$PWD/../../tgd/out"
          ) | Where-Object { Test-Path $_ }

          $matches = @()
          foreach ($root in $roots) {
            $matches += Get-ChildItem -Path $root -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Name -ieq "Astrogram.exe" -or $_.Name -ieq "Astrogram" -or $_.Name -ieq "Telegram.exe" -or $_.Name -ieq "Telegram"
              }
          }
          $matches = $matches | Sort-Object LastWriteTime -Descending -Unique

          if (-not $matches -or $matches.Count -eq 0) {
            Write-Host "Searched roots:"
            $roots | ForEach-Object { Write-Host " - $_" }
            Write-Host "Top executables for debugging:"
            if (Test-Path "$PWD/out") {
              Get-ChildItem -Path "$PWD/out" -Recurse -File -Include *.exe -ErrorAction SilentlyContinue |
                Select-Object -First 40 FullName
            }
            Write-Error "Astrogram binary was not found in known output paths."
            exit 1
          }

          $picked = $matches | Select-Object -First 1
          New-Item -ItemType Directory -Path "$PWD/dist" -Force | Out-Null
          Copy-Item -LiteralPath $picked.FullName -Destination "$PWD/dist/Astrogram.exe" -Force
          Write-Host "Picked binary: $($picked.FullName)"

      - name: Pack Windows portable ZIP
        if: ${{ always() && steps.locate_exe.outcome == 'success' }}
        id: pack_release_zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          function Find-SingleFile([string] $Name, [string[]] $Roots) {
            foreach ($root in $Roots) {
              if (-not (Test-Path -LiteralPath $root)) {
                continue
              }
              $match = Get-ChildItem -LiteralPath $root -Recurse -File -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -ieq $Name } |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
              if ($match) {
                return $match.FullName
              }
            }
            return $null
          }

          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $distRoot = Join-Path $workspace "dist"
          $astroExe = Join-Path $distRoot "Astrogram.exe"
          if (-not (Test-Path -LiteralPath $astroExe)) {
            throw "Astrogram.exe was not found in dist for portable packaging."
          }

          $versionMap = @{}
          foreach ($line in Get-Content -LiteralPath (Join-Path $workspace "Telegram\\build\\version")) {
            if ($line -match '^\s*([A-Za-z0-9_]+)\s+(.+?)\s*$') {
              $versionMap[$matches[1]] = $matches[2].Trim()
            }
          }
          $appVersion = $versionMap["AppVersion"]
          $appVersionStr = $versionMap["AppVersionStr"]
          if ([string]::IsNullOrWhiteSpace($appVersion)) {
            throw "AppVersion was not found in Telegram/build/version."
          }
          if ([string]::IsNullOrWhiteSpace($appVersionStr)) {
            $appVersionStr = $appVersion
          }

          $zipName = "Astrogram-windows-x64-$appVersionStr-$appVersion.zip"
          $zipPath = Join-Path $distRoot $zipName
          $stageRoot = Join-Path $distRoot "portable-stage"
          $appRoot = Join-Path $stageRoot "Astrogram"
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          if (Test-Path -LiteralPath $stageRoot) {
            Remove-Item -LiteralPath $stageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $appRoot -Force | Out-Null
          Copy-Item -LiteralPath $astroExe -Destination (Join-Path $appRoot "Astrogram.exe") -Force

          $roots = @(
            (Join-Path $workspace "out"),
            (Join-Path $workspace "Telegram\\out"),
            (Join-Path $workspace "out\\Release"),
            (Join-Path $workspace "Telegram\\out\\Release"),
            $distRoot
          )
          $d3dSource = Find-SingleFile "d3dcompiler_47.dll" $roots
          if ($d3dSource) {
            $d3dTargetDir = Join-Path $appRoot "modules\\win64\\d3d"
            New-Item -ItemType Directory -Path $d3dTargetDir -Force | Out-Null
            Copy-Item -LiteralPath $d3dSource -Destination (Join-Path $d3dTargetDir "d3dcompiler_47.dll") -Force
          }

          try {
            [System.IO.Compression.ZipFile]::CreateFromDirectory(
              $stageRoot,
              $zipPath,
              [System.IO.Compression.CompressionLevel]::Optimal,
              $false)
          } finally {
            if (Test-Path -LiteralPath $stageRoot) {
              Remove-Item -LiteralPath $stageRoot -Recurse -Force
            }
          }

          if (-not (Test-Path -LiteralPath $zipPath)) {
            throw "Portable ZIP was not produced: $zipPath"
          }

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_rel=dist/$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare updater signing headers
        if: ${{ always() && steps.locate_exe.outcome == 'success' && github.ref != 'refs/heads/main' }}
        shell: pwsh
        env:
          ASTROGRAM_UPDATES_PRIVATE_KEY: ${{ secrets.ASTROGRAM_UPDATES_PRIVATE_KEY }}
          ASTROGRAM_UPDATES_PRIVATE_BETA_KEY: ${{ secrets.ASTROGRAM_UPDATES_PRIVATE_BETA_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:ASTROGRAM_UPDATES_PRIVATE_KEY)) {
            throw "ASTROGRAM_UPDATES_PRIVATE_KEY secret is missing."
          }
          if ([string]::IsNullOrWhiteSpace($env:ASTROGRAM_UPDATES_PRIVATE_BETA_KEY)) {
            throw "ASTROGRAM_UPDATES_PRIVATE_BETA_KEY secret is missing."
          }

          $desktopPrivate = Join-Path (Resolve-Path -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "..")).Path "DesktopPrivate"
          New-Item -ItemType Directory -Path $desktopPrivate -Force | Out-Null

          $packerPrivate = @(
            'const char *PrivateKey = R"ASTROGRAMKEY(',
            $env:ASTROGRAM_UPDATES_PRIVATE_KEY.TrimEnd("`r", "`n"),
            ')ASTROGRAMKEY";',
            '',
            'const char *PrivateBetaKey = R"ASTROGRAMKEY(',
            $env:ASTROGRAM_UPDATES_PRIVATE_BETA_KEY.TrimEnd("`r", "`n"),
            ')ASTROGRAMKEY";',
            ''
          ) -join "`n"
          [System.IO.File]::WriteAllText(
            (Join-Path $desktopPrivate "packer_private.h"),
            $packerPrivate,
            [System.Text.UTF8Encoding]::new($false))
          [System.IO.File]::WriteAllText(
            (Join-Path $desktopPrivate "alpha_private.h"),
            'const char *AlphaPrivateKey = "";' + "`n",
            [System.Text.UTF8Encoding]::new($false))

      - name: Build updater tools (Release)
        if: ${{ always() && steps.locate_exe.outcome == 'success' && github.ref != 'refs/heads/main' }}
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%\\Telegram"
          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "PACK_CFG_LOG=%CI_LOGS_DIR%\\configure-packaging.log"
          set "PACK_BUILD_LOG=%CI_LOGS_DIR%\\build-packaging-tools.log"
          set "API_ID=17349"
          set "API_HASH=344583e45741c457fe1862106095a5eb"
          set "ACCEL_ARGS=-D CMAKE_POLICY_CMP0141=NEW -D CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded -D CMAKE_NINJA_FORCE_RESPONSE_FILE=ON"
          if /I "%ASTROGRAM_USE_SCCACHE%"=="1" set "ACCEL_ARGS=-D CMAKE_C_COMPILER_LAUNCHER=sccache -D CMAKE_CXX_COMPILER_LAUNCHER=sccache %ACCEL_ARGS%"

          call configure.bat x64 force %ACCEL_ARGS% -D TDESKTOP_API_ID=%API_ID% -D TDESKTOP_API_HASH=%API_HASH% -D DESKTOP_APP_DISABLE_AUTOUPDATE=OFF -D DESKTOP_APP_SPECIAL_TARGET=win64 > "%PACK_CFG_LOG%" 2>&1
          if errorlevel 1 (
            echo [packaging] configure failed
            powershell -NoProfile -Command "Get-Content -Path '%PACK_CFG_LOG%' -Tail 120"
            exit /b 1
          )

          cmake --build ..\out --config Release --parallel 1 --target Updater Packer > "%PACK_BUILD_LOG%" 2>&1
          if errorlevel 1 (
            echo [packaging] updater tools build failed
            powershell -NoProfile -Command "Get-Content -Path '%PACK_BUILD_LOG%' -Tail 120"
            exit /b 1
          )

      - name: Pack beta update bundle
        if: ${{ always() && steps.locate_exe.outcome == 'success' && github.ref != 'refs/heads/main' }}
        id: pack_beta
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Find-SingleExe([string] $Name, [string[]] $Roots) {
            foreach ($root in $Roots) {
              if (-not (Test-Path -LiteralPath $root)) {
                continue
              }
              $match = Get-ChildItem -LiteralPath $root -Recurse -File -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -ieq $Name } |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
              if ($match) {
                return $match.FullName
              }
            }
            return $null
          }

          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $roots = @(
            (Join-Path $workspace "out"),
            (Join-Path $workspace "Telegram\\out"),
            (Join-Path $workspace "out\\Release"),
            (Join-Path $workspace "Telegram\\out\\Release")
          )
          $astroExe = Join-Path $workspace "dist\\Astrogram.exe"
          if (-not (Test-Path -LiteralPath $astroExe)) {
            $astroExe = Find-SingleExe "Astrogram.exe" $roots
          }
          $updaterExe = Find-SingleExe "Updater.exe" $roots
          $packerExe = Find-SingleExe "Packer.exe" $roots
          if (-not $astroExe) {
            throw "Astrogram.exe was not found for beta pack."
          }
          if (-not $updaterExe) {
            throw "Updater.exe was not found for beta pack."
          }
          if (-not $packerExe) {
            throw "Packer.exe was not found for beta pack."
          }

          $versionMap = @{}
          foreach ($line in Get-Content -LiteralPath (Join-Path $workspace "Telegram\\build\\version")) {
            if ($line -match '^\s*([A-Za-z0-9_]+)\s+(.+?)\s*$') {
              $versionMap[$matches[1]] = $matches[2].Trim()
            }
          }
          $appVersion = $versionMap["AppVersion"]
          if ([string]::IsNullOrWhiteSpace($appVersion)) {
            throw "AppVersion was not found in Telegram/build/version."
          }

          $packRoot = Join-Path $workspace "dist\\update-feed"
          if (Test-Path -LiteralPath $packRoot) {
            Remove-Item -LiteralPath $packRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $packRoot -Force | Out-Null

          Copy-Item -LiteralPath $astroExe -Destination (Join-Path $packRoot "Astrogram.exe") -Force
          Copy-Item -LiteralPath $updaterExe -Destination (Join-Path $packRoot "Updater.exe") -Force

          $d3dSource = Join-Path (Split-Path -Parent $astroExe) "modules\\win64\\d3d\\d3dcompiler_47.dll"
          if (Test-Path -LiteralPath $d3dSource) {
            $d3dTargetDir = Join-Path $packRoot "modules\\win64\\d3d"
            New-Item -ItemType Directory -Path $d3dTargetDir -Force | Out-Null
            Copy-Item -LiteralPath $d3dSource -Destination (Join-Path $d3dTargetDir "d3dcompiler_47.dll") -Force
          }

          Push-Location $packRoot
          try {
            $arguments = @(
              "-version", $appVersion,
              "-path", "Astrogram.exe",
              "-path", "Updater.exe"
            )
            if (Test-Path -LiteralPath (Join-Path $packRoot "modules\\win64\\d3d\\d3dcompiler_47.dll")) {
              $arguments += @("-path", "modules\\win64\\d3d\\d3dcompiler_47.dll")
            }
            $arguments += @("-target", "win64", "-beta")
            & $packerExe @arguments
            if ($LASTEXITCODE -ne 0) {
              throw "Packer.exe failed with exit code $LASTEXITCODE."
            }
          } finally {
            Pop-Location
          }

          $updateFile = Join-Path $packRoot ("tx64upd" + $appVersion)
          if (-not (Test-Path -LiteralPath $updateFile)) {
            throw "Packed beta update file was not produced: $updateFile"
          }

          $current = [ordered]@{
            win64 = [ordered]@{
              beta = [ordered]@{
                released = [int64]$appVersion
                testing = [int64]$appVersion
                link = "/" + [IO.Path]::GetFileName($updateFile)
              }
            }
          }
          $currentPath = Join-Path $packRoot "current"
          [System.IO.File]::WriteAllText(
            $currentPath,
            ($current | ConvertTo-Json -Depth 6),
            [System.Text.UTF8Encoding]::new($false))

          "ready=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "update_file=$updateFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "current_file=$currentPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish beta update feed branch
        if: ${{ always() && steps.pack_beta.outputs.ready == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $source = Join-Path $workspace "dist\\update-feed"
          $branch = $env:BETA_FEED_BRANCH
          $repo = "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git"
          $publishRoot = Join-Path $env:RUNNER_TEMP "astrogram-beta-feed"
          if (Test-Path -LiteralPath $publishRoot) {
            Remove-Item -LiteralPath $publishRoot -Recurse -Force
          }

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git ls-remote --exit-code --heads $repo $branch *> $null
          if ($LASTEXITCODE -eq 0) {
            git clone --depth 1 --branch $branch $repo $publishRoot
          } else {
            git clone --depth 1 $repo $publishRoot
            Push-Location $publishRoot
            try {
              git checkout --orphan $branch
              Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
            } finally {
              Pop-Location
            }
          }

          Get-ChildItem -LiteralPath $source -Force | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $publishRoot -Recurse -Force
          }
          Push-Location $publishRoot
          try {
            git add current tx64upd*
            git status --short
            git diff --cached --quiet
            if ($LASTEXITCODE -ne 0) {
              git commit -m "beta update feed for ${{ github.sha }}"
              git push origin HEAD:$branch --force
            } else {
              Write-Host "[beta-feed] no changes to publish"
            }
          } finally {
            Pop-Location
          }

      - name: Publish beta prerelease
        if: ${{ always() && steps.pack_beta.outputs.ready == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-${{ github.run_id }}
          name: Astrogram Dev Beta ${{ steps.pack_beta.outputs.app_version }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            ${{ steps.pack_release_zip.outputs.zip_rel }}

      - name: Upload Windows artifact
        if: ${{ always() && steps.locate_exe.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: astrogram-windows-release
          path: ${{ steps.pack_release_zip.outputs.zip_rel }}
          if-no-files-found: error

  linux_deb:
    name: Ubuntu .deb (fallback)
    runs-on: ubuntu-22.04
    needs: windows
    if: ${{ false }}
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Build docker image for Linux toolchain
        env:
          JOBS: '2'
          DEBUG: ''
          LTO: ''
        run: |
          ./Telegram/build/prepare/linux.sh

      - name: Build Telegram (Release)
        run: |
          docker run --rm \
            -u "$(id -u)" \
            -v "$PWD:/usr/src/tdesktop" \
            tdesktop:centos_env \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D TDESKTOP_API_TEST=ON

      - name: Build .deb package
        run: |
          set -euo pipefail
          version="0.0.${GITHUB_RUN_NUMBER}"
          pkgroot="$PWD/package-root"
          appdir="$pkgroot/opt/tgd"
          desktopdir="$pkgroot/usr/share/applications"
          icondir="$pkgroot/usr/share/icons/hicolor/256x256/apps"

          mkdir -p "$pkgroot/DEBIAN" "$appdir" "$desktopdir" "$icondir"

          install -m 0755 out/Release/Astrogram "$appdir/astrogram"
          install -m 0644 lib/xdg/org.telegram.desktop.desktop "$desktopdir/org.telegram.desktop.desktop"
          install -m 0644 Telegram/Resources/art/icon256.png "$icondir/astrogram.png"

          sed -i 's#^Exec=.*#Exec=/opt/tgd/astrogram -- %u#' "$desktopdir/org.telegram.desktop.desktop"
          sed -i 's#^Icon=.*#Icon=astrogram#' "$desktopdir/org.telegram.desktop.desktop"

          cat > "$pkgroot/DEBIAN/control" <<EOF
          Package: tgd
          Version: ${version}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: tgd build bot <noreply@example.com>
          Depends: libc6 (>= 2.31), libstdc++6
          Description: Astrogram build of tgd with plugin system
          EOF

          dpkg-deb --build "$pkgroot" "tgd_${version}_amd64.deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astrogram-linux-deb
          path: |
            out/Release/Astrogram
            tgd_*.deb
