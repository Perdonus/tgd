name: Build Telegram Desktop Force
# CI touch: rerun Windows pipeline after canceled run.

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows (preferred)
    runs-on: windows-2022
    timeout-minutes: 360
    outputs:
      build_ok: ${{ steps.locate_exe.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare dependencies (Windows)
        id: prepare
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"

          git config --global core.longpaths true
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 30
          git config --global protocol.version 2

          set "PREPARE_MAX_TRIES=1"
          set "PREPARE_TRY=1"
          :prepare_retry
          echo [prepare] attempt !PREPARE_TRY! of !PREPARE_MAX_TRIES!
          powershell -NoProfile -Command "$p = Start-Process -FilePath 'cmd.exe' -ArgumentList '/d','/s','/c','call Telegram\\build\\prepare\\win.bat' -WorkingDirectory $env:GITHUB_WORKSPACE -PassThru -NoNewWindow; if (-not $p.WaitForExit(7800 * 1000)) { Write-Host '[prepare] timed out after 7800s'; try { $p.Kill($true) } catch {}; exit 124 }; exit $p.ExitCode"
          if not errorlevel 1 goto prepare_ok
          if !PREPARE_TRY! GEQ !PREPARE_MAX_TRIES! (
            echo [prepare] failed after !PREPARE_TRY! attempts
            exit /b 1
          )
          echo [prepare] failed, retry in 20s (transient network/proxy errors are common)
          timeout /t 20 /nobreak >nul
          set /a PREPARE_TRY+=1
          goto prepare_retry
          :prepare_ok

      - name: Ensure cmake submodule
        id: ensure_cmake
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          set "CMAKE_HELPERS_SHA=483a10954b0fafa7f759a82847b066c44466074c"

          set "CMAKE_SUBMODULE_MAX_TRIES=3"
          set "CMAKE_SUBMODULE_TRY=1"
          :cmake_submodule_retry
          if exist cmake\run_cmake.py goto cmake_submodule_ok
          echo [cmake-submodule] attempt !CMAKE_SUBMODULE_TRY! of !CMAKE_SUBMODULE_MAX_TRIES!
          git submodule sync --recursive
          git submodule update --init --recursive cmake
          if exist cmake\run_cmake.py goto cmake_submodule_ok

          echo [cmake-submodule] submodule update did not produce run_cmake.py, trying pinned checkout fallback
          if exist cmake rmdir /Q /S cmake
          git -c init.defaultBranch=__codex__ init cmake
          if errorlevel 1 exit /b 1
          git -C cmake remote add origin https://github.com/desktop-app/cmake_helpers.git
          if errorlevel 1 exit /b 1
          git -C cmake fetch --depth 1 origin %CMAKE_HELPERS_SHA%
          if errorlevel 1 exit /b 1
          git -C cmake checkout --detach FETCH_HEAD
          if errorlevel 1 exit /b 1
          if exist cmake\run_cmake.py goto cmake_submodule_ok
          if !CMAKE_SUBMODULE_TRY! GEQ !CMAKE_SUBMODULE_MAX_TRIES! (
            echo [cmake-submodule] cmake\\run_cmake.py is still missing
            if exist cmake (
              echo [cmake-submodule] cmake directory snapshot:
              dir /b cmake
            )
            exit /b 1
          )
          timeout /t 10 /nobreak >nul
          set /a CMAKE_SUBMODULE_TRY+=1
          goto cmake_submodule_retry
          :cmake_submodule_ok
          echo [cmake-submodule] ready: cmake\run_cmake.py
          exit /b 0

      - name: Ensure required source mirrors
        id: ensure_sources
        shell: pwsh
        run: |
          $moduleLines = @(git config -f .gitmodules --get-regexp "^submodule\..*\.path$")
          if (-not $moduleLines -or $moduleLines.Count -eq 0) {
            throw "[sources] no entries found in .gitmodules"
          }

          # Pin external ThirdParty mirrors to upstream gitlinks.
          # Keep desktop-app repos on HEAD because this fork expects newer APIs there.
          $moduleShas = @{
            "Telegram/ThirdParty/GSL" = "87f9d768866548b5b86e72be66c60c5abd4d9b37"
            "Telegram/ThirdParty/QR" = "720f62bddb7226106071d4728c292cb1df519ceb"
            "Telegram/ThirdParty/cld3" = "b48dc46512566f5a2d41118c8c1116c4f96dc661"
            "Telegram/ThirdParty/dispatch" = "886ca22f659c53dae66a40ee8266c7aae9bb97cd"
            "Telegram/ThirdParty/expected" = "292eff8bd8ee230a7df1d6a1c00c4ea0eb2f0362"
            "Telegram/ThirdParty/fcitx5-qt" = "c743b12e6780edf1dcfe9071531c80f050cacb95"
            "Telegram/ThirdParty/hime" = "9b3e6f9ab59d1fe4d9de73d3bf0fed7789f921c5"
            "Telegram/ThirdParty/hunspell" = "22c3381e2066bed616250d373fc5c935598b564a"
            "Telegram/ThirdParty/kcoreaddons" = "fd84da51b554eac25e35b1e3f373edaab3029b15"
            "Telegram/ThirdParty/kimageformats" = "df82311a1081e576c4ac020204578bb8a81b21ec"
            "Telegram/ThirdParty/libprisma" = "23b0d70f9709da9b38561d5706891a134d18df76"
            "Telegram/ThirdParty/lz4" = "5ff839680134437dbf4678f3d0c7b371d84f4964"
            "Telegram/ThirdParty/nimf" = "498ec7ffab3ac140c2469638a14451788f03e798"
            "Telegram/ThirdParty/range-v3" = "a81477931a8aa2ad025c6bda0609f38e09e4d7ec"
            "Telegram/ThirdParty/rlottie" = "8c69fc20cf2e150db304311f1233a4b55a8892d7"
            "Telegram/ThirdParty/tgcalls" = "24694f64b03e301ec2c90792566046e61a2c4967"
            "Telegram/ThirdParty/xdg-desktop-portal" = "11c8a96b147aeae70e3f770313f93b367d53fedd"
            "Telegram/ThirdParty/xxHash" = "bbb27a5efb85b92a0486cf361a8635715a53f6ba"
          }

          foreach ($line in $moduleLines) {
            $parts = $line -split '\s+', 2
            if ($parts.Count -lt 2) {
              continue
            }

            $pathKey = $parts[0]
            $modulePath = $parts[1].Trim()
            if ([string]::IsNullOrWhiteSpace($modulePath)) {
              continue
            }
            if ($modulePath -eq "cmake") {
              Write-Host "[sources] skip submodule handled separately: $modulePath"
              continue
            }

            $modulePrefix = $pathKey.Substring(0, $pathKey.Length - 5)
            $moduleUrl = (git config -f .gitmodules --get "$modulePrefix.url").Trim()
            if ([string]::IsNullOrWhiteSpace($moduleUrl)) {
              throw "[sources] url missing for $modulePath"
            }
            $moduleSha = $moduleShas[$modulePath]

            $target = Join-Path $env:GITHUB_WORKSPACE $modulePath
            $needsClone = $true
            if (Test-Path -LiteralPath $target) {
              $entries = @(Get-ChildItem -LiteralPath $target -Force -ErrorAction SilentlyContinue)
              if ($entries.Count -gt 0) {
                $needsClone = $false
              }
            }
            if (-not $needsClone) {
              Write-Host "[sources] ok: $modulePath"
              continue
            }
            if (Test-Path -LiteralPath $target) {
              Remove-Item -LiteralPath $target -Recurse -Force
            }
            if ([string]::IsNullOrWhiteSpace($moduleSha)) {
              Write-Host "[sources] clone HEAD: $modulePath"
              git clone --depth 1 --filter=blob:none $moduleUrl $target
              if ($LASTEXITCODE -ne 0) {
                throw "[sources] failed to clone $moduleUrl -> $modulePath"
              }
              continue
            }

            Write-Host "[sources] checkout pinned: $modulePath @ $moduleSha"
            git -c init.defaultBranch=__codex__ init $target
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to init repo for $modulePath"
            }
            git -C $target remote add origin $moduleUrl
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to add origin for $modulePath"
            }
            git -C $target fetch --depth 1 origin $moduleSha
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to fetch $moduleSha for $modulePath"
            }
            git -C $target checkout --detach FETCH_HEAD
            if ($LASTEXITCODE -ne 0) {
              throw "[sources] failed to checkout $moduleSha for $modulePath"
            }
          }

      - name: Normalize Qt and Libraries paths
        id: normalize_paths
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $parent = (Resolve-Path (Join-Path $workspace "..")).Path
          $libsRoot = Join-Path $parent "Libraries"
          $libsWin64 = Join-Path $libsRoot "win64"
          $workspaceLibs = Join-Path $workspace "Libraries"

          if (-not (Test-Path -LiteralPath $libsRoot)) {
            throw "[paths] Libraries root not found: $libsRoot"
          }

          if (-not (Test-Path -LiteralPath $workspaceLibs)) {
            New-Item -ItemType Junction -Path $workspaceLibs -Target $libsRoot | Out-Null
            Write-Host "[paths] linked $workspaceLibs -> $libsRoot"
          }

          $qtCandidates = @(
            @{ Ver = "5.15.18"; A = (Join-Path $libsWin64 "Qt-5.15.18"); B = (Join-Path $libsRoot "Qt-5.15.18") },
            @{ Ver = "6.10.1"; A = (Join-Path $libsWin64 "Qt-6.10.1"); B = (Join-Path $libsRoot "Qt-6.10.1") }
          )

          $foundQt = $false
          foreach ($q in $qtCandidates) {
            $a = $q.A
            $b = $q.B
            $aExists = Test-Path -LiteralPath $a
            $bExists = Test-Path -LiteralPath $b

            if ($aExists -and -not $bExists) {
              New-Item -ItemType Junction -Path $b -Target $a | Out-Null
              Write-Host "[paths] linked $b -> $a"
              $bExists = $true
            } elseif ($bExists -and -not $aExists) {
              New-Item -ItemType Junction -Path $a -Target $b | Out-Null
              Write-Host "[paths] linked $a -> $b"
              $aExists = $true
            }

            if ($aExists -or $bExists) {
              Write-Host "[paths] Qt candidate present: $($q.Ver)"
              $foundQt = $true
            }
          }

          if (-not $foundQt) {
            Write-Host "[paths] Libraries root snapshot:"
            Get-ChildItem -LiteralPath $libsRoot -Force -ErrorAction SilentlyContinue | Select-Object -First 60 Name
            if (Test-Path -LiteralPath $libsWin64) {
              Write-Host "[paths] Libraries/win64 snapshot:"
              Get-ChildItem -LiteralPath $libsWin64 -Force -ErrorAction SilentlyContinue | Select-Object -First 80 Name
            }
            throw "[paths] Qt directories were not found under $libsRoot or $libsWin64"
          }

      - name: Configure (Windows Release)
        id: configure
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%\\Telegram"

          set "CFG_OK="
          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "CFG_LOG_1=%CI_LOGS_DIR%\\configure-attempt1.log"
          set "CFG_LOG_2=%CI_LOGS_DIR%\\configure-attempt2.log"
          set "API_ID=17349"
          set "API_HASH=344583e45741c457fe1862106095a5eb"

          where python
          python --version

          if exist "%GITHUB_WORKSPACE%\\out\\CMakeCache.txt" del /f /q "%GITHUB_WORKSPACE%\\out\\CMakeCache.txt"
          if exist "%GITHUB_WORKSPACE%\\out\\CMakeFiles" rmdir /Q /S "%GITHUB_WORKSPACE%\\out\\CMakeFiles"

          call configure.bat x64 force -D TDESKTOP_API_TEST=ON -D TDESKTOP_API_ID=%API_ID% -D TDESKTOP_API_HASH=%API_HASH% > "%CFG_LOG_1%" 2>&1 && set "CFG_OK=1"
          if not defined CFG_OK (
            echo [configure] primary x64 flags failed, retrying: configure.bat x64 force
            powershell -NoProfile -Command "Get-Content -Path '%CFG_LOG_1%' -Tail 80"
            powershell -NoProfile -Command "$tail = (Get-Content -Path '%CFG_LOG_1%' -Tail 20) -join ' | '; Write-Output ('::warning title=Configure attempt1 failed::' + $tail)"
            call configure.bat x64 force -D TDESKTOP_API_ID=%API_ID% -D TDESKTOP_API_HASH=%API_HASH% > "%CFG_LOG_2%" 2>&1 && set "CFG_OK=1"
          )
          if not defined CFG_OK (
            echo [configure] all x64 configure attempts failed
            powershell -NoProfile -Command "Get-Content -Path '%CFG_LOG_2%' -Tail 80"
            powershell -NoProfile -Command "$tail = (Get-Content -Path '%CFG_LOG_2%' -Tail 30) -join ' | '; Write-Output ('::error title=Configure failed::' + $tail)"
            if exist "%GITHUB_WORKSPACE%\\cmake" (
              echo [configure] cmake helpers files:
              dir /b "%GITHUB_WORKSPACE%\\cmake"
            )
            if exist "%GITHUB_WORKSPACE%\\out" (
              echo [configure] out directory snapshot:
              dir /b "%GITHUB_WORKSPACE%\\out"
            )
            exit /b 1
          )
          exit /b 0

      - name: Build Telegram target (Release)
        id: build_target
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%\\Telegram"

          set "CI_LOGS_DIR=%GITHUB_WORKSPACE%\\ci-logs"
          if not exist "%CI_LOGS_DIR%" mkdir "%CI_LOGS_DIR%"
          set "BUILD_LOG_TARGET=%CI_LOGS_DIR%\\build-target.log"
          set "BUILD_LOG_RELEASE=%CI_LOGS_DIR%\\build-release.log"

          cmake --build ..\out --config Release --target Telegram > "%BUILD_LOG_TARGET%" 2>&1
          if not errorlevel 1 goto build_ok
          echo [build] target Telegram failed, retrying default Release build
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG_TARGET%' -Tail 120"
          powershell -NoProfile -Command "$tail = (Get-Content -Path '%BUILD_LOG_TARGET%' -Tail 40) -join ' | '; Write-Output ('::warning title=Target build failed::' + $tail)"
          cmake --build ..\out --config Release > "%BUILD_LOG_RELEASE%" 2>&1
          if not errorlevel 1 goto build_ok
          echo [build] default Release build failed
          powershell -NoProfile -Command "Get-Content -Path '%BUILD_LOG_RELEASE%' -Tail 120"
          powershell -NoProfile -Command "$tail = (Get-Content -Path '%BUILD_LOG_RELEASE%' -Tail 40) -join ' | '; Write-Output ('::error title=Release build failed::' + $tail)"
          exit /b 1
          :build_ok
          exit /b 0

      - name: Upload diagnostics logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-logs
          path: |
            ci-logs/*.log
          if-no-files-found: ignore

      - name: Locate built EXE
        if: ${{ steps.build_target.outcome == 'success' }}
        id: locate_exe
        shell: pwsh
        run: |
          $roots = @(
            "$PWD/out",
            "$PWD/Telegram/out",
            "$PWD/out/Release",
            "$PWD/out/Debug",
            "$PWD/../out",
            "$PWD/../../out",
            "$PWD/../tgd/out",
            "$PWD/../../tgd/out"
          ) | Where-Object { Test-Path $_ }

          $matches = @()
          foreach ($root in $roots) {
            $matches += Get-ChildItem -Path $root -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -ieq "Telegram.exe" -or $_.Name -ieq "Telegram" }
          }
          $matches = $matches | Sort-Object LastWriteTime -Descending -Unique

          if (-not $matches -or $matches.Count -eq 0) {
            Write-Host "Searched roots:"
            $roots | ForEach-Object { Write-Host " - $_" }
            Write-Host "Top executables for debugging:"
            if (Test-Path "$PWD/out") {
              Get-ChildItem -Path "$PWD/out" -Recurse -File -Include *.exe -ErrorAction SilentlyContinue |
                Select-Object -First 40 FullName
            }
            Write-Error "Telegram binary was not found in known output paths."
            exit 1
          }

          $picked = $matches | Select-Object -First 1
          New-Item -ItemType Directory -Path "$PWD/dist" -Force | Out-Null
          Copy-Item -LiteralPath $picked.FullName -Destination "$PWD/dist/Telegram.exe" -Force
          Write-Host "Picked binary: $($picked.FullName)"

      - name: Upload Windows artifact
        if: ${{ steps.locate_exe.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: telegram-windows-release
          path: |
            dist/Telegram.exe
          if-no-files-found: error

  linux_deb:
    name: Ubuntu .deb (fallback)
    runs-on: ubuntu-22.04
    needs: windows
    if: ${{ false }}
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Build docker image for Linux toolchain
        env:
          JOBS: '2'
          DEBUG: ''
          LTO: ''
        run: |
          ./Telegram/build/prepare/linux.sh

      - name: Build Telegram (Release)
        run: |
          docker run --rm \
            -u "$(id -u)" \
            -v "$PWD:/usr/src/tdesktop" \
            tdesktop:centos_env \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D TDESKTOP_API_TEST=ON

      - name: Build .deb package
        run: |
          set -euo pipefail
          version="0.0.${GITHUB_RUN_NUMBER}"
          pkgroot="$PWD/package-root"
          appdir="$pkgroot/opt/tgd"
          desktopdir="$pkgroot/usr/share/applications"
          icondir="$pkgroot/usr/share/icons/hicolor/256x256/apps"

          mkdir -p "$pkgroot/DEBIAN" "$appdir" "$desktopdir" "$icondir"

          install -m 0755 out/Release/Telegram "$appdir/telegram-desktop"
          install -m 0644 lib/xdg/org.telegram.desktop.desktop "$desktopdir/org.telegram.desktop.desktop"
          install -m 0644 Telegram/Resources/art/icon256.png "$icondir/telegram-desktop.png"

          sed -i 's#^Exec=.*#Exec=/opt/tgd/telegram-desktop -- %u#' "$desktopdir/org.telegram.desktop.desktop"
          sed -i 's#^Icon=.*#Icon=telegram-desktop#' "$desktopdir/org.telegram.desktop.desktop"

          cat > "$pkgroot/DEBIAN/control" <<EOF
          Package: tgd
          Version: ${version}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: tgd build bot <noreply@example.com>
          Depends: libc6 (>= 2.31), libstdc++6
          Description: Telegram Desktop build of tgd with plugin system
          EOF

          dpkg-deb --build "$pkgroot" "tgd_${version}_amd64.deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-linux-deb
          path: |
            out/Release/Telegram
            tgd_*.deb
